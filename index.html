<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para Meu Amor ❤️</title>

<style>
body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    font-family:Arial;
    overflow:auto;
    min-height:100vh;
}

h1{
    color:white;
    margin-top:40px;
    font-size:50px;
}

p{
    color:white;
    font-size:22px;
}

.foto{
    width:320px;
    max-width:90%;
    border:8px solid white;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:25px;
    cursor:pointer;
}

.coracao{
    position:absolute;
    top:-20px;
    color:red;
    font-size:25px;
    animation:cair linear forwards;
}

@keyframes cair{
    from{
        transform:translateY(-50px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<h1>❤️ Para o Amor da Minha Vida ❤️</h1>

<p>
Você é a melhor coisa que aconteceu na minha vida.
</p>

<img src="foto/nos.jpeg" class="foto">

<br>

<button onclick="mensagem()">
Clique Aqui ❤️
</button>
<br><br>
<h2>🎵 Nossa Música: Until I Found You</h2>

<a href="https://www.youtube.com/watch?v=GxldQ9eX2wo" target="_blank">
    <button>🎵 Tocar Música</button>
</a>


    

<script>
function mensagem(){
    alert("Eu te amo infinitamente ❤️");
}

function criarCoracao(){
    const coracao=document.createElement("div");

    coracao.className="coracao";
    coracao.innerHTML="❤️";

    coracao.style.left=Math.random()*100+"vw";

    coracao.style.animationDuration=
    (Math.random()*3+3)+"s";

    document.body.appendChild(coracao);

    setTimeout(()=>{
        coracao.remove();
    },6000);
}

setInterval(criarCoracao,200);
</script>

</body>
</html>
